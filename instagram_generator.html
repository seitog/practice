<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instagram投稿文ジェネレーター</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, 'Helvetica Neue', sans-serif;
      background: #f7f7f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 36px 32px;
      width: 100%;
      max-width: 520px;
      box-shadow: 0 2px 20px rgba(0,0,0,0.07);
    }
    h1 {
      font-size: 1.15em;
      font-weight: 700;
      color: #111;
      letter-spacing: -0.02em;
      margin-bottom: 28px;
      text-align: center;
    }
    h1 span { color: #E1306C; }
    label {
      display: block;
      margin-top: 20px;
      font-size: 0.78em;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    input, textarea, select {
      width: 100%;
      padding: 11px 14px;
      margin-top: 6px;
      border: 1.5px solid #eee;
      border-radius: 10px;
      font-size: 0.97em;
      color: #111;
      background: #fafafa;
      -webkit-appearance: none;
      transition: border-color 0.15s;
    }
    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: #E1306C;
      background: white;
    }
    textarea { resize: vertical; line-height: 1.6; }
    .hint { font-size: 0.75em; color: #bbb; margin-top: 5px; }
    .api-section {
      background: #fafafa;
      border: 1.5px solid #eee;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 4px;
    }
    .api-section label { color: #bbb; margin-top: 0; }
    .api-section input { background: white; font-family: monospace; font-size: 0.82em; }
    .divider {
      border: none;
      border-top: 1.5px solid #f0f0f0;
      margin: 28px 0 4px;
    }
    button {
      margin-top: 28px;
      width: 100%;
      padding: 15px;
      background: #111;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 0.97em;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.03em;
      transition: background 0.15s;
    }
    button:hover { background: #333; }
    button:disabled { background: #ddd; cursor: not-allowed; }
    #output {
      margin-top: 24px;
      background: #fafafa;
      border: 1.5px solid #eee;
      border-radius: 14px;
      padding: 20px;
      white-space: pre-wrap;
      line-height: 1.9;
      display: none;
      font-size: 0.93em;
      color: #222;
    }
    #copy-btn {
      background: white;
      color: #111;
      border: 1.5px solid #ddd;
      display: none;
      margin-top: 10px;
    }
    #copy-btn:hover { background: #f5f5f5; }
    .loading { text-align: center; color: #bbb; padding: 20px; display: none; font-size: 0.9em; }
    .error {
      color: #c0392b;
      background: #fff5f5;
      border: 1.5px solid #fdd;
      border-radius: 10px;
      padding: 12px 14px;
      margin-top: 16px;
      display: none;
      font-size: 0.88em;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>📸 Instagram<span>投稿文</span>ジェネレーター</h1>

    <div class="api-section">
      <label>🔑 Anthropic APIキー</label>
      <input type="password" id="apikey" placeholder="sk-ant-..." autocomplete="off">
      <p class="hint">このブラウザにのみ保存。外部には送信されません。</p>
    </div>

    <hr class="divider">

    <label>カテゴリ</label>
    <select id="category">
      <option value="行事">行事</option>
      <option value="授業">授業</option>
      <option value="日常風景">日常風景</option>
      <option value="入学情報">入学情報</option>
    </select>

    <label>学年</label>
    <input type="text" id="grade" placeholder="例：5年生">

    <label>行事・授業名</label>
    <input type="text" id="event" placeholder="例：千葉大学留学生との交流会">

    <label>内容のポイント</label>
    <textarea id="points" rows="4" placeholder="例：身ぶり手ぶりで交流、笑顔、異文化理解&#10;（キーワードを箇条書きでもOKです）"></textarea>
    <p class="hint">キーワードを入れるほど文章が豊かになります</p>

    <button id="generate-btn" onclick="generate()">投稿文を生成する</button>

    <div class="loading" id="loading">✨ 生成中です...</div>
    <div class="error" id="error"></div>
    <div id="output"></div>
    <button id="copy-btn" onclick="copyText()">📋 コピーする</button>
  </div>

  <script>
    // ページ読み込み時にAPIキーを復元
    window.addEventListener('load', () => {
      const saved = localStorage.getItem('anthropic_api_key');
      if (saved) document.getElementById('apikey').value = saved;
    });

    // APIキーが変更されたら保存
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('apikey').addEventListener('change', (e) => {
        if (e.target.value) localStorage.setItem('anthropic_api_key', e.target.value);
      });
    });

    async function generate() {
      const apiKey = document.getElementById('apikey').value.trim();
      const category = document.getElementById('category').value;
      const grade = document.getElementById('grade').value.trim() || '〇年生';
      const event = document.getElementById('event').value.trim() || '〇〇';
      const points = document.getElementById('points').value.trim();

      if (!apiKey) {
        showError('APIキーを入力してください。');
        return;
      }
      if (!event || event === '〇〇') {
        showError('行事・授業名を入力してください。');
        return;
      }

      const btn = document.getElementById('generate-btn');
      btn.disabled = true;
      document.getElementById('loading').style.display = 'block';
      document.getElementById('output').style.display = 'none';
      document.getElementById('copy-btn').style.display = 'none';
      document.getElementById('error').style.display = 'none';

      const prompt = `昭和学院小学校のInstagram投稿文を作成してください。

【入力情報】
- カテゴリ：${category}
- 学年：${grade}
- 行事・授業名：${event}
- 内容のポイント：${points || '（特になし）'}

【出力ルール】
- 1行目：「${grade}が、${event}を行いました」＋絵文字1個
- 空行
- 2〜4行：短い情景描写（体言止め・改行多め・読みやすく）。ポイントのキーワードを活かして、子どもたちの様子が目に浮かぶような自然な文章にすること。
- 空行
- 締めの1文：「〜する時間になりました」「〜が広がりました」など＋絵文字1個
- 空行
- ハッシュタグ：#昭和学院 #昭和学院小学校 #小学校 #市川 #私立小学校 ＋内容に合ったもの3〜5個

【文体のルール】
- 温かみのある文体
- 子どもたちの様子が目に浮かぶような表現
- 「子ども」を使う（「子供」はNG）
- 投稿文のみ出力（説明・前置き・コメント不要）

【参考例】
5年生が、千葉大学の留学生との交流会を行いました 🌍

言葉や文化の違いにふれながら、
身ぶり手ぶりで伝え合ったり、
お互いの国について質問したりと、
教室にはたくさんの笑顔が広がりました。

「伝えたい」「知りたい」という気持ちによって、
自然と交流が深まる時間になりました 😊

#昭和学院 #昭和学院小学校 #小学校 #市川 #私立小学校 #留学生交流 #国際交流`;

      try {
        const res = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-api-key': apiKey,
            'anthropic-version': '2023-06-01',
            'anthropic-dangerous-direct-browser-access': 'true'
          },
          body: JSON.stringify({
            model: 'claude-haiku-4-5-20251001',
            max_tokens: 512,
            messages: [{ role: 'user', content: prompt }]
          })
        });

        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.error?.message || `エラーが発生しました（${res.status}）`);
        }

        const data = await res.json();
        const text = data.content[0].text.trim();

        const output = document.getElementById('output');
        output.textContent = text;
        output.style.display = 'block';
        document.getElementById('copy-btn').style.display = 'block';

      } catch (e) {
        showError(e.message);
      } finally {
        btn.disabled = false;
        document.getElementById('loading').style.display = 'none';
      }
    }

    function showError(msg) {
      const el = document.getElementById('error');
      el.textContent = '⚠️ ' + msg;
      el.style.display = 'block';
    }

    function copyText() {
      const text = document.getElementById('output').textContent;
      navigator.clipboard.writeText(text).then(() => {
        document.getElementById('copy-btn').textContent = '✅ コピーしました！';
        setTimeout(() => { document.getElementById('copy-btn').textContent = '📋 コピーする'; }, 2000);
      });
    }
  </script>
</body>
</html>
