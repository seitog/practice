<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instagram投稿文ジェネレーター</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; background: #fafafa; }
    h1 { color: #333; font-size: 1.4em; }
    label { display: block; margin-top: 16px; font-weight: bold; color: #555; }
    input, textarea, select { width: 100%; padding: 8px; margin-top: 6px; border: 1px solid #ccc; border-radius: 6px; font-size: 1em; box-sizing: border-box; }
    button { margin-top: 24px; width: 100%; padding: 12px; background: #E1306C; color: white; border: none; border-radius: 8px; font-size: 1em; cursor: pointer; }
    button:hover { background: #c1255a; }
    #output { margin-top: 24px; background: white; border: 1px solid #ddd; border-radius: 8px; padding: 16px; white-space: pre-wrap; line-height: 1.8; display: none; font-size: 0.95em; }
    #copy-btn { background: #555; display: none; }
    #copy-btn:hover { background: #333; }
    .hint { font-size: 0.8em; color: #999; margin-top: 4px; }
  </style>
</head>
<body>
  <h1>📸 Instagram投稿文ジェネレーター</h1>

  <label>カテゴリ</label>
  <select id="category">
    <option value="行事">行事</option>
    <option value="授業">授業</option>
    <option value="日常風景">日常風景</option>
    <option value="入学情報">入学情報</option>
  </select>

  <label>学年</label>
  <input type="text" id="grade" placeholder="例：5年生">

  <label>行事・授業名</label>
  <input type="text" id="event" placeholder="例：千葉大学留学生との交流会">

  <label>内容のポイント</label>
  <textarea id="points" rows="4" placeholder="例：身ぶり手ぶりで交流、笑顔、異文化理解&#10;（複数ある場合は改行か読点で区切ってください）"></textarea>
  <p class="hint">ポイントを詳しく書くほど文章のクオリティが上がります</p>

  <button onclick="generate()">投稿文を生成する</button>

  <div id="output"></div>
  <button id="copy-btn" onclick="copyText()">📋 コピーする</button>

  <script>
    // カテゴリ別の絵文字
    const categoryEmoji = {
      '行事': ['🎉', '🏆', '🌟', '🎊'],
      '授業': ['📚', '✏️', '🔬', '🎨'],
      '日常風景': ['☀️', '🌈', '🍃', '💫'],
      '入学情報': ['🌸', '🎒', '✨', '🌷']
    };

    // カテゴリ別の情景描写テンプレート
    const sceneTemplates = {
      '行事': [
        (p) => `${p}ながら、`,
        (p) => `${p}場面では、`,
        (p) => `${p}様子が見られ、`,
      ],
      '授業': [
        (p) => `${p}ながら、`,
        (p) => `${p}する姿が見られ、`,
        (p) => `${p}たりと、`,
      ],
      '日常風景': [
        (p) => `${p}ながら、`,
        (p) => `${p}場面があったり、`,
        (p) => `${p}する様子で、`,
      ],
      '入学情報': [
        (p) => `${p}ながら、`,
        (p) => `${p}する姿が見られ、`,
        (p) => `${p}たりと、`,
      ]
    };

    // カテゴリ別の締め文テンプレート
    const closingTemplates = {
      '行事': [
        '子どもたちの真剣な姿と笑顔が、会場いっぱいに広がる時間になりました',
        '仲間と力を合わせながら、大切な思い出をつくることができました',
        '子どもたちの成長を感じる、温かな一日になりました',
        '一人ひとりが輝く、すてきな時間になりました',
      ],
      '授業': [
        '「わかった」「やってみたい」という気持ちが、学びを深める時間になりました',
        '子どもたちの目がきらきらと輝く、充実した学びの時間になりました',
        '友だちと考えを伝え合いながら、学びを深めることができました',
        '子どもたちの豊かな発想に、教室が活気にあふれる時間になりました',
      ],
      '日常風景': [
        '何気ない一コマの中に、子どもたちの成長が感じられます',
        '子どもたちの笑顔があふれる、学校生活の一場面です',
        '毎日の積み重ねの中で、子どもたちはすくすくと育っています',
        '子どもたちの元気な姿に、こちらまで温かい気持ちになります',
      ],
      '入学情報': [
        '昭和学院小学校で、お子さんの新しい一歩を踏み出しませんか',
        'たくさんのご応募をお待ちしております',
        '子どもたちの豊かな学びと成長を、全力でサポートします',
        'ご不明な点はお気軽にお問い合わせください',
      ]
    };

    // ハッシュタグのキーワードマッピング
    const hashtagMap = {
      '交流': ['#国際交流', '#異文化理解'],
      '留学生': ['#留学生交流', '#国際交流'],
      '運動会': ['#運動会', '#体育'],
      '遠足': ['#遠足', '#校外学習'],
      '音楽': ['#音楽', '#合唱', '#演奏'],
      '図工': ['#図工', '#アート', '#図画工作'],
      '理科': ['#理科', '#実験', '#理科の授業'],
      '算数': ['#算数', '#数学', '#算数の授業'],
      '国語': ['#国語', '#読書', '#国語の授業'],
      '社会': ['#社会', '#社会科', '#社会の授業'],
      '体育': ['#体育', '#スポーツ'],
      '給食': ['#給食', '#食育'],
      '掃除': ['#掃除', '#清掃活動'],
      '読書': ['#読書', '#図書', '#本'],
      '英語': ['#英語', '#外国語活動'],
      'プール': ['#水泳', '#プール'],
      '入学': ['#入学', '#新入生', '#小学校入学'],
      '卒業': ['#卒業', '#卒業式'],
      '合唱': ['#合唱', '#音楽'],
      '展覧会': ['#展覧会', '#作品展'],
    };

    function pickRandom(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function buildHashtags(event, points, category) {
      const base = '#昭和学院 #昭和学院小学校 #小学校 #市川 #私立小学校';
      const extras = new Set();

      const text = event + points;
      for (const [keyword, tags] of Object.entries(hashtagMap)) {
        if (text.includes(keyword)) {
          tags.forEach(t => extras.add(t));
        }
      }

      // カテゴリ別の固定タグ
      if (category === '入学情報') extras.add('#入学説明会');
      if (category === '行事') extras.add('#学校行事');
      if (category === '授業') extras.add('#授業風景');
      if (category === '日常風景') extras.add('#学校生活');

      // イベント名からタグを生成（短い場合）
      const eventClean = event.replace(/[をがはにのでとも]/g, '').trim();
      if (eventClean.length <= 10 && eventClean.length > 1) {
        extras.add(`#${eventClean}`);
      }

      const extraArr = Array.from(extras).slice(0, 5);
      return base + (extraArr.length > 0 ? ' ' + extraArr.join(' ') : '');
    }

    function buildScene(pointList, category) {
      if (pointList.length === 0) return '';

      const templates = sceneTemplates[category];
      const lines = pointList.slice(0, 4).map((p, i) => {
        const tmpl = templates[i % templates.length];
        return tmpl(p);
      });

      // 最後の行を調整
      const last = lines[lines.length - 1].replace(/、$/, 'と、');
      lines[lines.length - 1] = last;

      return lines.join('\n') + '\n教室にはたくさんの笑顔が広がりました。';
    }

    function generate() {
      const category = document.getElementById('category').value;
      const grade = document.getElementById('grade').value.trim() || '〇年生';
      const event = document.getElementById('event').value.trim() || '〇〇';
      const pointsRaw = document.getElementById('points').value.trim();

      const pointList = pointsRaw
        .split(/[、,，\n。]/)
        .map(p => p.trim())
        .filter(p => p.length > 0);

      const emojis = categoryEmoji[category];
      const emoji = pickRandom(emojis);

      const scene = buildScene(pointList, category);
      const closingBase = pickRandom(closingTemplates[category]);
      const closing = `${closingBase} 😊`;
      const hashtags = buildHashtags(event, pointsRaw, category);

      const parts = [
        `${grade}が、${event}を行いました ${emoji}`,
        scene,
        closing,
        hashtags
      ].filter(p => p);

      const text = parts.join('\n\n');

      const output = document.getElementById('output');
      output.textContent = text;
      output.style.display = 'block';
      document.getElementById('copy-btn').style.display = 'block';
    }

    function copyText() {
      const text = document.getElementById('output').textContent;
      navigator.clipboard.writeText(text).then(() => {
        document.getElementById('copy-btn').textContent = '✅ コピーしました！';
        setTimeout(() => { document.getElementById('copy-btn').textContent = '📋 コピーする'; }, 2000);
      });
    }
  </script>
</body>
</html>
